services:
  fetch:
    build: .
    command: python fetch_signals.py
    environment:
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_CLASSIFY_MODEL=${LLM_CLASSIFY_MODEL:-}
      - LLM_ACTIVATE_MODEL=${LLM_ACTIVATE_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - MANUS_API_KEY=${MANUS_API_KEY:-}
    volumes:
      - ./data:/app/data

  web:
    build: .
    command: python app.py
    ports:
      - "8000:8000"
    environment:
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_CLASSIFY_MODEL=${LLM_CLASSIFY_MODEL:-}
      - LLM_ACTIVATE_MODEL=${LLM_ACTIVATE_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - MANUS_API_KEY=${MANUS_API_KEY:-}
    volumes:
      - ./data:/app/data
